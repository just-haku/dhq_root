<!doctype html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <title>Edit Collaboration Terms - Operator Dashboard</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='darkmode.css') }}">
    <style>
      body { background-color: #f5f7fa; transition: background-color 0.3s, color 0.3s; }
      .navbar { border-bottom: 1px solid #ccc; }
      .container { margin-top: 2rem; }
    </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
          <a class="navbar-brand" href="{{ url_for('operator.index') }}">Operator Dashboard</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                  data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                  aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                  <li class="nav-item me-2">
                      <button id="modeToggle" class="btn btn-outline-secondary">Dark Mode</button>
                  </li>
                  <li class="nav-item me-2">
                      <button class="btn btn-secondary" onclick="window.history.back();">Back</button>
                  </li>
                  <li class="nav-item">
                      <a class="nav-link btn btn-outline-primary" href="{{ url_for('operator.index') }}">Dashboard</a>
                  </li>
                  <li class="nav-item ms-2">
                      <a class="nav-link btn btn-outline-primary" href="{{ url_for('auth.logout') }}">Logout</a>
                  </li>
              </ul>
          </div>
      </div>
  </nav>
  
  <!-- Main Container -->
  <div class="container mt-4">
      <h2>Edit Global Collaboration Terms</h2>
      <form method="post" action="{{ url_for('operator.edit_collab_terms') }}">
          <div class="mb-3">
              <label for="collabTerms" class="form-label">Collaboration Terms (comma-separated)</label>
              <textarea class="form-control" id="collabTerms" name="collab_terms" rows="3">{{ collab_terms }}</textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Terms</button>
      </form>
  </div>
  
  <!-- Dark Mode Toggle Script -->
  <script>
      const modeToggle = document.getElementById('modeToggle');
      if (localStorage.getItem('darkMode') === 'enabled') {
          document.body.classList.add('dark-mode');
          modeToggle.innerText = 'Light Mode';
      } else {
          modeToggle.innerText = 'Dark Mode';
      }
      modeToggle.addEventListener('click', function() {
          document.body.classList.toggle('dark-mode');
          if (document.body.classList.contains('dark-mode')) {
              localStorage.setItem('darkMode', 'enabled');
              modeToggle.innerText = 'Light Mode';
          } else {
              localStorage.setItem('darkMode', 'disabled');
              modeToggle.innerText = 'Dark Mode';
          }
      });
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
