<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid OS | Secure Access</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="min-h-screen overflow-hidden bg-black text-white">

    <!-- 1. BACKGROUND ENGINE -->
    <div id="ambientLayer" class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-cover bg-center bg-zoom" style="background-image: url('img.jpg'); background-color: #1a1a1a;"></div>
        <div class="ambient-orb bg-indigo-500 top-[-10%] left-[-10%]"></div>
        <div class="ambient-orb bg-fuchsia-600 bottom-[-10%] right-[-10%]" style="animation-delay: -5s;"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/80"></div>
    </div>

    <!-- 2. LOGIN STAGE -->
    <main id="loginStage" class="relative z-10 flex items-center justify-center min-h-screen px-4 transition-all duration-700">
        <div class="liquid-card w-full max-w-[340px] sm:max-w-[360px] rounded-[40px] p-8 sm:p-10 initial-load" id="loginCard">
            <div class="flex flex-col items-center mb-10">
                <div class="relative w-16 h-16 mb-6 float-icon">
                    <div class="absolute inset-0 bg-white/10 rounded-[28%] rotate-12 blur-sm"></div>
                    <div class="relative w-full h-full rounded-[28%] bg-gradient-to-tr from-white/20 to-white/5 border border-white/20 flex items-center justify-center backdrop-blur-xl">
                        <i data-lucide="shield-check" class="w-8 h-8 text-white/90" stroke-width="1.2"></i>
                    </div>
                </div>
                <h1 class="text-2xl font-light tracking-tight text-center">Sign In</h1>
            </div>

            <form id="loginForm" class="space-y-4">
                <div class="relative flex items-center group">
                    <i data-lucide="user" class="absolute left-4 w-5 h-5 text-white/20 group-focus-within:text-white/70 transition-all"></i>
                    <input type="text" placeholder="Username" required class="liquid-input w-full rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder:text-white/20 outline-none text-base">
                </div>

                <div class="relative flex items-center group">
                    <i data-lucide="key-round" class="absolute left-4 w-5 h-5 text-white/20 group-focus-within:text-white/70 transition-all"></i>
                    <input type="password" id="passwordInput" placeholder="Password" required class="liquid-input w-full rounded-2xl py-3.5 pl-12 pr-12 text-white placeholder:text-white/20 outline-none text-base">
                    <button type="button" id="togglePassword" class="absolute right-4 text-white/20 hover:text-white/70 p-1">
                        <i data-lucide="eye" class="w-5"></i>
                    </button>
                </div>

                <button type="submit" id="submitBtn" class="liquid-btn w-full rounded-2xl py-3.5 mt-4 transition-all">
                    <div id="btnContent" class="flex items-center justify-center gap-2 text-white font-medium">
                        <span>Join in</span>
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </div>
                    <div id="btnLoader" class="hidden absolute inset-0 flex items-center justify-center">
                        <div class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                    </div>
                </button>
            </form>

            <div class="mt-8 flex justify-center border-t border-white/5 pt-6">
                <button class="text-white/50 hover:text-white text-xs font-bold uppercase tracking-widest flex items-center gap-1 transition-all group">
                    Register New Account 
                    <i data-lucide="arrow-up-right" class="w-3.5 h-3.5 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- 3. ANIMATION LAYER (Rocket & Smoke) -->
    <div id="animationLayer" class="fixed inset-0 z-40 pointer-events-none hidden">
        <div id="rocket" class="absolute bottom-[-100px] left-1/2 -translate-x-1/2 text-white">
            <i data-lucide="rocket" class="w-16 h-16 fill-white"></i>
        </div>
        <div id="smokeContainer" class="absolute inset-0 overflow-hidden"></div>
    </div>

    <!-- 4. DASHBOARD STAGE (Sample) -->
    <main id="dashboardStage" class="fixed inset-0 z-30 hidden items-center justify-center p-6 bg-black/40 backdrop-blur-md">
        <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-6 opacity-0 translate-y-10 transition-all duration-1000" id="dashContent">
            <!-- Stats Card -->
            <div class="liquid-card rounded-[32px] p-6 col-span-1 md:col-span-2">
                <h2 class="text-xl font-light mb-6 flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 text-indigo-400"></i>
                    System Overview
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                        <p class="text-[10px] text-white/40 uppercase tracking-widest mb-1">Network Load</p>
                        <p class="text-2xl font-semibold">12.4 GB/s</p>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                        <p class="text-[10px] text-white/40 uppercase tracking-widest mb-1">Security Score</p>
                        <p class="text-2xl font-semibold text-green-400">99.8%</p>
                    </div>
                </div>
            </div>
            <!-- Quick Actions -->
            <div class="liquid-card rounded-[32px] p-6">
                <h2 class="text-xl font-light mb-6">Quick Link</h2>
                <div class="space-y-3">
                    <button class="w-full bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/5 flex items-center justify-between transition-all group">
                        <span class="text-sm">Storage Settings</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-white/20 group-hover:text-white"></i>
                    </button>
                    <button class="w-full bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/5 flex items-center justify-between transition-all group">
                        <span class="text-sm">Device Logs</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-white/20 group-hover:text-white"></i>
                    </button>
                    <button id="logoutBtn" class="w-full bg-red-500/10 hover:bg-red-500/20 p-3 rounded-xl border border-red-500/20 text-red-400 text-sm transition-all mt-4">
                        Exit Terminal
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Error Notif -->
    <div id="errorNotif" class="fixed top-8 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-[340px] opacity-0 pointer-events-none transition-all duration-500">
        <div class="bg-white/10 backdrop-blur-2xl border border-white/20 rounded-2xl p-4 shadow-2xl flex gap-3 items-start">
            <div class="bg-red-500/20 p-2 rounded-full"><i data-lucide="info" class="w-5 h-5 text-red-400"></i></div>
            <p class="text-sm text-white/90 leading-tight">Door locked, your username or password is not on the list.</p>
        </div>
    </div>

    <!-- Light Warp SVG Filter -->
    <svg style="position: fixed; width: 0; height: 0;">
        <filter id="lightWarp">
            <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <script src="scripts.js"></script>
</body>
</html>
