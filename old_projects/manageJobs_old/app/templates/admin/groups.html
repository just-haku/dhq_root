{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between mb-4">
        <h3>Group Management</h3>
        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-light">Back to Users</a>
    </div>

    <div class="card bg-dark text-white">
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0 align-middle">
                <thead>
                    <tr>
                        <th>Group Name</th>
                        <th>Members</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for g in groups %}
                    <tr>
                        <td class="fw-bold">{{ g.name }}</td>
                        <td>{{ g.users|length }}</td>
                        <td>
                            <a href="{{ url_for('admin.group_perms', group_id=g.id) }}" class="btn btn-sm btn-warning">Permissions</a>
                            <form action="{{ url_for('admin.delete_group', group_id=g.id) }}" method="POST" class="d-inline" onsubmit="return confirm('Delete Group?');">
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
